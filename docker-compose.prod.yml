services:
  backend:
    image: karthxk07/tasktrack-backend
    environment:
      - MYSQL_DB_URL=jdbc:mysql://db:3306/${MYSQL_DB_NAME}?createDatabaseIfNotExist=true
      - MYSQL_DB_USERNAME=${MYSQL_DB_USERNAME}
      - MYSQL_DB_PASSWORD=${MYSQL_DB_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
  client:
    image: karthxk07/tasktrack-client
    depends_on:
      - backend
    environment:
      - VITE_APP_BASE_URL=${VITE_API_PROD_BASE_URL}
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - backend
  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=${MYSQL_DB_NAME}
      - MYSQL_USER=${MYSQL_DB_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    volumes:
      - taskdb:/var/lib/mysql
volumes:
  taskdb:
    driver: local
